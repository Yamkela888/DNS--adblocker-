server:
    # =========================================================
    # BASIC SETTINGS
    # =========================================================
    
    # Run as a background service
    verbosity: 0
    
    # Listen on this port — we use 5335 to avoid conflicting
    # with Pi-hole which owns port 53
    port: 5335
    
    # Only listen on localhost inside the Docker network
    # This means Unbound is never exposed to the outside world
    interface: 0.0.0.0
    
    # Allow queries from anywhere within the Docker network
    access-control: 0.0.0.0/0 allow

    # =========================================================
    # PROTOCOL SETTINGS
    # =========================================================
    
    # Answer queries on both IPv4 and IPv6
    do-ip4: yes
    do-ip6: yes
    
    # Send queries using both TCP and UDP
    do-tcp: yes
    do-udp: yes

    # =========================================================
    # PERFORMANCE & RELIABILITY
    # =========================================================
    
    # Number of threads — 1 is fine for home use
    num-threads: 1
    
    # Cache settings — how many DNS answers to remember
    msg-cache-size: 50m
    rrset-cache-size: 100m
    
    # How long to keep answers in cache (seconds)
    cache-min-ttl: 3600
    cache-max-ttl: 86400
    
    # Prefetch popular domains before they expire from cache
    # This makes repeated lookups faster
    prefetch: yes
    prefetch-key: yes

    # =========================================================
    # PRIVACY SETTINGS
    # =========================================================
    
    # Do not include local system info in DNS replies
    hide-identity: yes
    hide-version: yes
    
    # Harden against queries for non-existent record types
    harden-glue: yes
    harden-dnssec-stripped: yes
    harden-algo-downgrade: yes
    
    # Use 0x20 encoding to reduce chance of cache poisoning
    use-caps-for-id: yes
    
    # Limit exposure of your query patterns to upstream
    qname-minimisation: yes

    # =========================================================
    # DNSSEC VALIDATION
    # =========================================================
    
    # Enable DNSSEC — cryptographically verify DNS responses
    # This ensures answers haven't been tampered with
    auto-trust-anchor-file: "/var/lib/unbound/root.key"

    # =========================================================
    # ROOT HINTS
    # =========================================================
    
    # Tell Unbound where the root DNS servers are
    # This is the starting point for all recursive resolution
    root-hints: "/etc/unbound/root.hints"

    # =========================================================
    # LOGGING
    # =========================================================
    
    # Log to stdout so Docker can capture it with docker logs
    logfile: ""
    log-queries: no
